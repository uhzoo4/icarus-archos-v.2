# Icarus-ArchOS — Hyprland compositor profile
# macOS-inspired look: rounded corners, translucent blur, spring-style motion.

monitor=,preferred,auto,1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(a0a0a0aa) rgba(101010aa) 45deg
    col.inactive_border = rgba(1a1a1aee)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
    drop_shadow = true
    shadow_range = 25
    shadow_render_power = 4
    col.shadow = rgba(00000055)
}

animations {
    enabled = true
    bezier = osx, 0.13, 0.99, 0.29, 1.0
    animation = windows, 1, 6, osx, slide
    animation = windowsOut, 1, 6, osx, slide
    animation = fade, 1, 5, default
    animation = workspaces, 1, 6, osx, slide
    animation = border, 1, 8, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ---------------------------------------------------------------------------
# Windows/Wine application handling. Wine's native Wayland backend surfaces
# apps as ordinary toplevel windows once WINEPREFIX has the Wayland driver
# registry key set (see /etc/profile.d/wine-wayland.sh) — no XWayland-only
# fixups are needed at the compositor level, just sane tiling/opacity rules.
# Only real Hyprland directives are used here.
# ---------------------------------------------------------------------------
windowrulev2 = tile, class:^(wine)$
windowrulev2 = rounding 12, class:^(wine)$
windowrulev2 = opacity 0.98 0.94, class:^(wine)$

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------
bind = SUPER, Space, exec, rofi -show drun -theme icarus-spotlight
bind = SUPER, Q, killactive,
bind = SUPER, Return, exec, kitty
bind = SUPER, E, exec, dolphin
bind = SUPER, F, fullscreen,
bind = SUPER SHIFT, Q, exit,
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4

exec-once = waybar
exec-once = dunst
exec-once = swaybg -m fill -c 1a1a1a
exec-once = /usr/lib/polkit-kde-authentication-agent-1
