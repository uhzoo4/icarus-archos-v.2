# Icarus-ArchOS — Hyprland compositor profile
# "Intelligent Darkness": calm, dangerous, elegant, alive. Matte black and
# titanium surfaces, cool moonlit accents, restrained motion with weight —
# no bounce, no overshoot, no gamer-RGB. The desktop should read as a
# control room, not a theme.

monitor=,preferred,auto,1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

general {
    gaps_in = 6
    gaps_out = 16
    border_size = 1
    # Titanium border with a faint steel-blue glow on the active window,
    # near-invisible gunmetal on inactive ones. No saturated color anywhere.
    col.active_border = rgba(9aa0a6dd) rgba(4a6d8ccc) 45deg
    col.inactive_border = rgba(26282bcc)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
        # No "jelly" — a restrained frosted-glass read, not a heavy glassmorphism effect.
        noise = 0.02
        contrast = 1.05
        brightness = 0.9
    }
    drop_shadow = true
    shadow_range = 30
    shadow_render_power = 3
    # Cool, near-black shadow rather than pure neutral black — keeps the
    # "cold blues" undertone even in the negative space.
    col.shadow = rgba(05050588)
    col.shadow_inactive = rgba(05050544)
}

animations {
    enabled = true
    # Single easing curve throughout: decelerates into place, never
    # overshoots past its target (no bounce, no rubber-band feel).
    bezier = cinematic, 0.16, 1, 0.3, 1
    # popin = scale up from a smaller size while fading in — this is the
    # macOS-style "grow into place" open/close, not a slide.
    animation = windowsIn, 1, 4, cinematic, popin 80%
    animation = windowsOut, 1, 4, cinematic, popin 80%
    animation = fade, 1, 4, cinematic
    animation = workspaces, 1, 5, cinematic, slide
    animation = border, 1, 6, cinematic
    animation = layersIn, 1, 3, cinematic, popin 90%
    animation = layersOut, 1, 3, cinematic, popin 90%
}

# ---------------------------------------------------------------------------
# Glassmorphism, applied consistently — not just to windows (which get
# decoration:blur automatically) but to layer-shell surfaces too: Waybar,
# Rofi, and dunst's notification popups. Without an explicit layerrule,
# these three would stay flat while every window gets frosted glass —
# "blur in all the tabs" means covering these three specifically.
#
# NOTE: this is the long-standing hyprlang syntax, still current in Arch's
# packaged Hyprland as of this writing. Hyprland is mid-migration toward a
# Lua-based config (hyprlang deprecated as of 0.55, per the official wiki)
# — if a future Hyprland update rejects these lines, check
# https://wiki.hypr.land/Configuring/ for the current layer-rule syntax;
# don't assume this file's syntax is permanently correct.
# ---------------------------------------------------------------------------
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, notifications
layerrule = ignorezero, notifications

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(050505)
}

# ---------------------------------------------------------------------------
# Cursor + GTK env — actual theme files (Bibata-Modern-Ice, adw-gtk3-dark,
# Papirus-Dark) are installed by layers/05-ui-winhybrid.sh (Papirus) and
# layers/07-native-apps.sh (Bibata, adw-gtk — both AUR, need paru, which
# only exists by Layer 7). Referencing the names here is safe regardless
# of install order since nothing reads these until first login, after
# every layer has finished.
# ---------------------------------------------------------------------------
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,22
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,22
env = GTK_THEME,adw-gtk3-dark

# ---------------------------------------------------------------------------
# Windows/Wine application handling. Wine's native Wayland backend surfaces
# apps as ordinary toplevel windows once WINEPREFIX has the Wayland driver
# registry key set (see /etc/profile.d/wine-wayland.sh) — no XWayland-only
# fixups are needed at the compositor level, just sane tiling/opacity rules.
# Only real Hyprland directives are used here.
# ---------------------------------------------------------------------------
windowrulev2 = tile, class:^(wine)$
windowrulev2 = rounding 12, class:^(wine)$
windowrulev2 = opacity 0.98 0.94, class:^(wine)$

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------
bind = SUPER, Space, exec, rofi -show drun -theme icarus-spotlight
bind = SUPER, Q, killactive,
bind = SUPER, Return, exec, kitty
bind = SUPER, E, exec, dolphin
bind = SUPER, F, fullscreen,
bind = SUPER SHIFT, Q, exit,
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4

exec-once = waybar
exec-once = dunst
exec-once = /usr/local/bin/icarus-wallpaper
exec-once = /usr/lib/polkit-kde-authentication-agent-1
