# Icarus-ArchOS — Hyprland compositor profile
# "Intelligent Darkness": calm, dangerous, elegant, alive. Matte black and
# titanium surfaces, cool moonlit accents, restrained motion with weight —
# no bounce, no overshoot, no gamer-RGB. The desktop should read as a
# control room, not a theme.
#
# Animation curves and timing values refined from end-4/Illogical-Impulse
# and HyDE patterns, adapted to the heavier, more deliberate Icarus feel.

source = ~/.config/icarus/theme/colors.conf

monitor=,preferred,auto,1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        drag_lock = true
    }
    sensitivity = 0
    accel_profile = adaptive
}

general {
    gaps_in = 6
    gaps_out = 16
    border_size = 1
    # Titanium border with a dynamic accent glow on the active window,
    # near-invisible gunmetal on inactive ones. No saturated color anywhere.
    col.active_border = rgba(9aa0a6dd) $accent 45deg
    col.inactive_border = rgba(26282bcc)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 6
        passes = 2
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.05
        brightness = 0.9
    }
    
    # Shadows are disabled to prevent fatal syntax errors across different Hyprland versions.
    # If you are on v0.41+, you can safely add a shadow { } block here.
    
    # Dim inactive windows very slightly — keeps focus obvious without
    # making inactive windows feel dead.
    dim_inactive = true
    dim_strength = 0.08
}

animations {
    enabled = true

    # ---------------------------------------------------------------------------
    # Bezier curves — stolen from end-4/Illogical-Impulse and HyDE, then
    # adapted. The "cinematic" curve is our signature: heavy deceleration,
    # zero overshoot. Others are specialized per-animation-type.
    # ---------------------------------------------------------------------------
    bezier = cinematic, 0.16, 1, 0.3, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = easeOutQuart, 0.25, 1, 0.5, 1
    bezier = easeInOutQuart, 0.76, 0, 0.24, 1
    bezier = snapIn, 0.85, 0, 0.15, 1

    # popin = scale up from center while fading in — macOS-style open/close
    animation = windowsIn, 1, 4, cinematic, popin 80%
    animation = windowsOut, 1, 4, cinematic, popin 80%
    # Move is snappier than open/close — things should feel planted once
    # they exist, and fast when you drag them.
    animation = windowsMove, 1, 3, easeOutQuart
    animation = fade, 1, 4, cinematic
    animation = fadeIn, 1, 3, easeOutExpo
    animation = fadeOut, 1, 3, easeOutExpo
    # Workspace slide keeps momentum — the only animation that needs
    # to feel like it has real physical inertia.
    animation = workspaces, 1, 5, easeOutExpo, slide
    animation = specialWorkspace, 1, 4, easeInOutQuart, slidevert
    animation = border, 1, 6, cinematic
    animation = borderangle, 1, 30, easeOutQuart, loop
    # Layer surfaces (Rofi, notifications, Waybar) pop in slightly
    # larger than windows — they're overlays, they should feel lighter.
    animation = layersIn, 1, 3, cinematic, popin 90%
    animation = layersOut, 1, 2, easeOutExpo, popin 90%
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
    smart_split = false
    smart_resizing = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(050505)
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    focus_on_activate = true
    on_focus_under_fullscreen = 0
}

# ---------------------------------------------------------------------------
# Cursor + GTK env — actual theme files (Bibata-Modern-Ice, adw-gtk3-dark,
# Papirus-Dark) are installed by layers/05-ui-winhybrid.sh (Papirus) and
# layers/07-native-apps.sh (Bibata, adw-gtk — both AUR, need paru, which
# only exists by Layer 7). Referencing the names here is safe regardless
# of install order since nothing reads these until first login, after
# every layer has finished.
# ---------------------------------------------------------------------------
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,22
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,22
env = GTK_THEME,adw-gtk3-dark

# ---------------------------------------------------------------------------
# Windows/Wine application handling. Wine's native Wayland backend surfaces
# apps as ordinary toplevel windows once WINEPREFIX has the Wayland driver
# registry key set (see /etc/profile.d/wine-wayland.sh) — no XWayland-only
# fixups are needed at the compositor level, just sane tiling/opacity rules.
# Only real Hyprland directives are used here.
# ---------------------------------------------------------------------------
windowrulev2 = tile, class:^(wine)$
windowrulev2 = rounding 12, class:^(wine)$
windowrulev2 = opacity 0.98 0.94, class:^(wine)$

# --- Kitty: glass terminal — slightly transparent for blur-through ---
windowrulev2 = opacity 0.92 0.88, class:^(kitty)$

# --- Float rules for dialogs & utility windows ---
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = size 650 420, class:^(pavucontrol)$
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, title:^(Open Folder)$
windowrulev2 = float, title:^(Volume Control)$
windowrulev2 = float, class:^(xdg-desktop-portal)$
windowrulev2 = float, class:^(org.freedesktop.impl.portal)$

# --- Picture-in-Picture (PiP) rules (stolen from end-4) ---
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = keepaspectratio, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 25% 25%, title:^(Picture-in-Picture)$
windowrulev2 = move 72% 72%, title:^(Picture-in-Picture)$

# --- Screen sharing indicators (stolen from end-4) ---
windowrulev2 = float, title:.*is sharing (a window|your screen).*
windowrulev2 = pin, title:.*is sharing (a window|your screen).*

# --- Smart performance: No shadows for tiled windows (stolen from end-4) ---
windowrulev2 = noshadow, floating:0

# ---------------------------------------------------------------------------
# Glassmorphism/blur layer rules — Waybar, Rofi, and Dunst notifications
# ---------------------------------------------------------------------------
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, notifications
layerrule = ignorezero, notifications

# ---------------------------------------------------------------------------
# Keybindings — comprehensive set stolen from HyDE/ML4W, adapted.
# ---------------------------------------------------------------------------

# --- Window management ---
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen
bind = SUPER, P, pseudo
bind = SUPER, J, togglesplit
bind = SUPER, V, togglefloating

# --- App launchers ---
bind = SUPER, Space, exec, rofi -show drun -theme icarus-spotlight
bind = SUPER, Tab, exec, eww open dashboard --toggle
bind = SUPER, Return, exec, kitty
bind = SUPER, E, exec, dolphin
bind = SUPER, W, exec, icarus-wallpaper-switch
bind = SUPER SHIFT, W, exec, icarus-wallpaper-switch --random
bind = SUPER SHIFT, D, exec, icarus-wallpaper-switch --random

# --- System controls ---
bind = SUPER, L, exec, hyprlock
bind = SUPER, Escape, exec, wlogout -b 4
bind = SUPER SHIFT, Q, exit

# --- Screenshots (grim + slurp + wl-copy) (upgraded using active-monitor capture from end-4) ---
bind = , Print, exec, grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" - | wl-copy && notify-send "Screenshot" "Active monitor copied to clipboard"
bind = SUPER, Print, exec, grim -g "$(slurp -d)" - | wl-copy && notify-send "Screenshot" "Selection copied to clipboard"
bind = SUPER SHIFT, S, exec, grim -g "$(slurp -d)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot" "Saved to ~/Pictures/"

# --- Visual Crop Search (Google Lens) (stolen from end-4) ---
bind = SUPER SHIFT, A, exec, ~/.config/hypr/scripts/snip_to_search.sh

# --- Clipboard history ---
bind = SUPER, C, exec, cliphist list | rofi -dmenu -theme icarus-spotlight -p "Clipboard" | cliphist decode | wl-copy

# --- Media / hardware keys ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# --- Workspaces 1-9 ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# --- Move/resize with mouse ---
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# --- Move focus with arrow keys ---
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# --- Resize with keyboard ---
binde = SUPER ALT, left, resizeactive, -30 0
binde = SUPER ALT, right, resizeactive, 30 0
binde = SUPER ALT, up, resizeactive, 0 -30
binde = SUPER ALT, down, resizeactive, 0 30

# --- Move windows with keyboard ---
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# --- Mouse scroll through workspaces ---
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# --- Special workspace (scratchpad) ---
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER ALT, S, movetoworkspace, special:magic

# ---------------------------------------------------------------------------
# Autostart
# ---------------------------------------------------------------------------
exec-once = waybar
exec-once = dunst
exec-once = eww daemon
exec-once = /usr/local/bin/icarus-wallpaper
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = sh -c "[ -f ~/.config/icarus/.welcome-done ] || kitty -T \"Icarus Welcome\" -e icarus-welcome"

# --- System Vitals Monitors (stolen from JaKooLit) ---
exec-once = ~/.config/hypr/scripts/battery-monitor.sh &
exec-once = ~/.config/hypr/scripts/disk-monitor.sh &
exec-once = ~/.config/hypr/scripts/temp-monitor.sh &

