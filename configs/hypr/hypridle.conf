# ~/.config/hypr/hypridle.conf
# Icarus-ArchOS — idle management chain
# Dim → lock → DPMS off → suspend. Stolen from end-4/HyDE idle patterns.
# Always locks before suspend for security.

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Phase 1: dim the screen after 5 minutes of inactivity
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 40%
    on-resume = brightnessctl -r
}

# Phase 2: lock the session after 10 minutes
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Phase 3: turn off the display after 15 minutes
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Phase 4: suspend the machine after 30 minutes
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
