# ~/.config/hypr/hyprlock.conf
# Icarus-ArchOS — Intelligent Darkness lock screen
#
# Cinematic full-screen experience. Stacked vertical clock, ambient status
# indicator, enhanced input field with steel-blue glow. Design patterns
# studied from Qylock Nothing (card zones, staggered composition) and
# SilentSDDM (lock-state transitions), reimagined entirely for hyprlock.

source = ~/.config/icarus/theme/colors.conf

general {
    no_fade_in = false
    grace = 3
    disable_loading_bar = true
    hide_cursor = true
    fractional_scaling = 2
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 10
    brightness = 0.30
    contrast = 0.85
    vibrancy = 0.08
    noise = 0.015
}

# ─── Hours ─── massive vertical stack, top portion ───
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $textPrimary
    font_size = 160
    font_family = JetBrainsMono Nerd Font
    position = 0, 260
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(74, 109, 140, 0.25)
    shadow_boost = 0.8
}

# ─── Minutes ─── paired with hours, slightly offset ───
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $accent
    font_size = 160
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(74, 109, 140, 0.20)
    shadow_boost = 0.6
}

# ─── Date line ─── day name + date, spaced out ───
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A"  | tr '[:lower:]' '[:upper:]')   ·   $(date +"%B %d" | tr '[:lower:]' '[:upper:]')"
    color = $accentLight
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -10
    halign = center
    valign = center
}

# ─── Ambient status indicator ─── slow-cycling satellite icon ───
label {
    monitor =
    text = cmd[update:3000] printf '%s' "$(shuf -n1 -e '󰓅' '󰖩' '󱎓' '󰂎' '󰤁')"
    color = rgba(74, 109, 140, 0.12)
    font_size = 200
    font_family = JetBrainsMono Nerd Font
    position = -180, -200
    halign = center
    valign = center
}

# ─── System locked status ─── with pulsing dot ───
label {
    monitor =
    text = cmd[update:1000] printf '  %s  SYSTEM LOCKED' "$([ $(( $(date +%s) % 2 )) -eq 0 ] && echo '●' || echo '○')"
    color = rgba(199, 202, 205, 0.45)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -60
    halign = center
    valign = center
}

# ─── Password input field ─── enhanced steel-blue glow ───
input-field {
    monitor =
    size = 320, 58
    outline_thickness = 3
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(74, 109, 140, 0.65)
    inner_color = rgba(5, 5, 5, 0.90)
    font_color = rgba(199, 202, 205, 0.95)
    fade_on_empty = true
    fade_timeout = 2500
    placeholder_text = <i>▸ authenticate</i>
    hide_input = false
    rounding = 16
    check_color = rgba(125, 158, 130, 0.85)
    fail_color = rgba(201, 107, 107, 0.85)
    fail_text = <i>access denied</i>
    fail_transition = 400
    capslock_color = rgba(232, 169, 77, 0.85)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(74, 109, 140, 0.15)
}

# ─── Branding — bottom-right corner ───
label {
    monitor =
    text =     I C A R U S
    color = rgba(154, 160, 166, 0.20)
    font_size = 13
    font_family = JetBrains Mono Nerd Font
    position = -30, 30
    halign = right
    valign = bottom
}

# ─── Builder credit — bottom-left ───
label {
    monitor =
    text = by yoozhaa
    color = rgba(154, 160, 166, 0.15)
    font_size = 11
    font_family = JetBrains Mono Nerd Font
    position = 30, 30
    halign = left
    valign = bottom
}

# ─── Authentication hint — above input ───
label {
    monitor =
    text =     enter passphrase to unlock
    color = rgba(199, 202, 205, 0.25)
    font_size = 11
    font_family = JetBrains Mono Nerd Font
    position = 0, -90
    halign = center
    valign = center
}
