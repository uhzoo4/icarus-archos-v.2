# ~/.config/hypr/hyprlock.conf
# Icarus-ArchOS — Intelligent Darkness lock screen
# Cinematic blur, massive clock, "ICARUS" branding, steel-blue input glow.
# Inspired by ML4W/HyDE lock screen patterns, adapted to ID palette.

source = ~/.config/icarus/theme/colors.conf

general {
    no_fade_in = false
    grace = 3
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.35
    contrast = 0.9
    vibrancy = 0.1
    noise = 0.02
}

# --- Hours ---
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $textPrimary
    font_size = 140
    font_family = JetBrainsMono Nerd Font
    position = 0, 240
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
}

# --- Minutes ---
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $textPrimary
    font_size = 140
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
}

# --- Date line ---
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = $accentLight
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# --- Greeting ---
label {
    monitor =
    text = cmd[update:0] echo "System Locked - $USER"
    color = rgba(199, 202, 205, 0.7)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -70
    halign = center
    valign = center
}

# --- Password input field ---
input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(74, 109, 140, 0.8)
    inner_color = rgba(10, 10, 10, 0.85)
    font_color = rgba(199, 202, 205, 0.9)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <i>Enter passphrase...</i>
    hide_input = false
    rounding = 12
    check_color = rgba(125, 158, 130, 0.8)
    fail_color = rgba(201, 107, 107, 0.8)
    fail_text = <i>Authentication failed</i>
    fail_transition = 300
    capslock_color = rgba(232, 169, 77, 0.8)
    position = 0, -50
    halign = center
    valign = center
}

# --- Branding — bottom-right corner ---
label {
    monitor =
    text = ICARUS
    color = rgba(154, 160, 166, 0.3)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = -30, 30
    halign = right
    valign = bottom
}

# --- Builder credit — bottom-left ---
label {
    monitor =
    text = by yoozhaa
    color = rgba(154, 160, 166, 0.2)
    font_size = 11
    font_family = JetBrains Mono Nerd Font
    position = 30, 30
    halign = left
    valign = bottom
}
