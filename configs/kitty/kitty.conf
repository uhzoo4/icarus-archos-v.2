# ~/.config/kitty/kitty.conf
# Icarus-ArchOS — Cockpit Terminal
# Glass feel with compositor blur, Intelligent Darkness palette across all
# 16 ANSI colors. Every color is muted and deliberate — no screaming neons.

# --- Font ---
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
disable_ligatures never

# --- Cursor ---
cursor                 #4A6D8C
cursor_text_color      #0a0a0a
cursor_shape           beam
cursor_beam_thickness  1.8
cursor_blink_interval  0.5

# --- Scrollback ---
scrollback_lines 10000

# --- Mouse ---
url_color #4A6D8C
url_style curly
detect_urls yes
copy_on_select clipboard

# --- Bell ---
enable_audio_bell no
visual_bell_duration 0

# --- Window ---
window_padding_width 12
placement_strategy center
hide_window_decorations yes
confirm_os_window_close 0

# --- Background opacity (compositor blur shows through) ---
background_opacity 0.88
dynamic_background_opacity yes

# --- Tab bar ---
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
active_tab_foreground   #C7CACD
active_tab_background   #1a1d20
active_tab_font_style   bold
inactive_tab_foreground #9aa0a6
inactive_tab_background #0a0a0a
tab_bar_background      #050505
tab_bar_margin_width    4.0
tab_bar_margin_height   4.0 0.0

# ---------------------------------------------------------------------------
# Intelligent Darkness — 16-color ANSI palette
#
# Design intent: muted, desaturated. No pure primaries. Every color is
# something you'd find in a titanium-and-glass control room at 2 AM.
# Bright variants are lighter but never saturated — they emphasize,
# they don't shout.
# ---------------------------------------------------------------------------

# Base colors
foreground #C7CACD
background #0a0a0a
selection_foreground #0a0a0a
selection_background #4A6D8C

# Black (near-black / dark charcoal)
color0  #1a1d20
color8  #3a3d42

# Red (soft, muted — errors should concern you, not assault you)
color1  #C96B6B
color9  #D98E8E

# Green (sage — success is calm confidence)
color2  #7D9E82
color10 #9CB8A0

# Yellow / Amber (warm but restrained — warnings, not alerts)
color3  #E8A94D
color11 #F0C078

# Blue (steel-blue — the accent, the identity)
color4  #4A6D8C
color12 #6B8FAD

# Magenta (muted purple — subtle, structural)
color5  #8B7BA8
color13 #A899C0

# Cyan (ice-blue — reserved for highlights)
color6  #6BA8B8
color14 #AEE3F0

# White (silver / titanium)
color7  #C7CACD
color15 #E8EAED

# --- Marks ---
mark1_foreground #0a0a0a
mark1_background #4A6D8C
mark2_foreground #0a0a0a
mark2_background #7D9E82
mark3_foreground #0a0a0a
mark3_background #E8A94D

# Wallpaper-driven palette overlay. A default is installed with the base
# config, then icarus-palette rewrites it after each wallpaper selection.
include colors.conf
