# Default dynamic palette overlay. icarus-palette rewrites this file whenever
# the wallpaper changes; kitty.conf includes it after its static base palette.
background #050505
foreground #C7CACD
selection_background #2C4A63
selection_foreground #C7CACD
url_color #5B8BA8
cursor #4A6D8C
active_border_color #4A6D8C
inactive_border_color #2C4A63
active_tab_background #4A6D8C
active_tab_foreground #050505
inactive_tab_background #0A0A0A
inactive_tab_foreground #C7CACD
