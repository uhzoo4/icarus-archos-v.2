# Icarus application profiles installed by Layer 9 during image assembly.
#
# Use space-separated profile names from:
#   essentials creative sharing development gaming connectivity
#
# This default keeps the finished system useful on its first boot without
# pulling in large creative or gaming workloads. Override it at assembly time
# with: ./icarus-assemble.sh --app-profiles "development gaming" --target /dev/sdX
ICARUS_DEFAULT_APP_PROFILES="essentials sharing"
